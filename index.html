<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>we are so adorable</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Pacifico', cursive;
      background: url('https://wallpapercave.com/wp/wp14933258.webp') center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 210, 230, 0.55);
      backdrop-filter: blur(3px);
    }

    .container {
      position: relative;
      width: 380px;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 25px 50px rgba(255,105,180,0.4);
      text-align: center;
    }

    h1 {
      font-size: 26px;
      color: #ff5fa2;
      margin-bottom: 24px;
      text-shadow: 2px 2px 0 #fff;
    }

    .cards {
      display: flex;
      gap: 32px;
    }

    .card {
      flex: 1;
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(255,105,180,0.35);
      transition: transform 0.35s ease;
    }

    .card:hover { transform: translateY(-6px); }

    .name {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px;
      color: #ff4f9a;
      text-shadow: 1px 1px 0 #fff;
    }

    .avatar {
      width: 100%;
      height: 140px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 3px solid #ffb6c1;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tg {
      display: block;
      padding: 12px;
      border-radius: 999px;
      background: #ff9fcb;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      transition: transform 0.25s ease;
    }

    .tg:hover { transform: scale(1.07); }

    .music {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff69b4;
      border-radius: 999px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(255,105,180,0.6);
      cursor: pointer;
    }

    .music span {
      color: #fff;
      font-size: 18px;
    }

    .music input {
      width: 0;
      opacity: 0;
      transition: width 0.3s ease, opacity 0.3s ease;
    }

    .music:hover input {
      width: 80px;
      opacity: 1;
    }

    audio { display: none; }
  </style>
</head>

<body>

  <div class="container">
    <h1>we are so adorable >,.,<</h1>

    <div class="cards">
      <div class="card">
        <div class="name">naive</div>
        <div class="avatar">
          <img src="naive.png">
        </div>
        <a class="tg" href="https://t.me/TELEGRAM_1" target="_blank">>,.,<</a>
      </div>

      <div class="card">
        <div class="name">reverse</div>
        <div class="avatar">
          <img src="reverse.jpg">
        </div>
        <a class="tg" href="https://t.me/TELEGRAM_2" target="_blank">>,.,<</a>
      </div>
    </div>
  </div>

  <audio id="bgm" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="music">
    <span>♪</span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      value="0.15"
      id="volume"
    >
  </div>

  <script>
    const music = document.getElementById('bgm');
    const volume = document.getElementById('volume');

    music.volume = 0.15;

    volume.addEventListener('input', () => {
      music.volume = volume.value;
    });
  </script>

</body>
</html>
